<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Торты на заказ</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #ffffff; color: #333; }

        .admin-bar {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 10px 20px;
            background: #333;
            justify-content: space-between;
            align-items: center;
            z-index: 300;
        }
        .admin-bar.show { display: flex; }
        .admin-bar span { color: #fff; font-size: 0.9rem; }
        .admin-close-btn {
            background: #ff4444;
            color: #fff;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
        }

        header {
            background: #111111;
            padding: 0;
            text-align: center;
            position: relative;
            overflow: hidden;
            animation: headerAnim 1s ease;
        }
        @keyframes headerAnim {
            from { transform: translateY(-100%); }
            to { transform: translateY(0); }
        }
        .header-inner {
            position: relative;
            z-index: 2;
            padding: 40px 20px 35px;
        }
        .header-swirls {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        h1 { font-size: 2.5rem; color: #ffffff; margin-bottom: 10px; font-weight: 300; letter-spacing: 4px; text-transform: uppercase; }
        .subtitle { color: #aaaaaa; font-size: 1rem; letter-spacing: 2px; }

        nav {
            background: #fff;
            padding: 15px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        nav button {
            background: none;
            border: none;
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
            font-size: 1rem;
            color: #111;
            border-radius: 25px;
        }
        nav button:hover, nav button.active { background: #111; color: #fff; }
        nav .add-cat-btn {
            display: none;
            background: #4CAF50;
            color: #fff;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            padding: 0;
            line-height: 35px;
            font-size: 1.3rem;
            margin-left: 10px;
            cursor: pointer;
        }
        body.admin-mode nav .add-cat-btn { display: inline-block; }
        nav .nav-cat-group {
            position: relative;
            display: inline-flex;
            align-items: center;
            margin: 5px;
        }
        .nav-cat-del {
            display: none;
            background: #ff4444;
            color: #fff;
            border: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 0.75rem;
            line-height: 20px;
            text-align: center;
            padding: 0;
            margin-left: 4px;
        }
        body.admin-mode .nav-cat-del { display: inline-block; }
        .nav-cat-del:hover { background: #cc0000; }

        main { max-width: 1200px; margin: 0 auto; padding: 30px 20px; }
        .cakes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }

        .cake-card {
            background: #fff;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 3px 15px rgba(0,0,0,0.08);
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            position: relative;
            animation: cardPop 0.5s ease backwards;
        }
        .cake-card:nth-child(1) { animation-delay: 0.1s; }
        .cake-card:nth-child(2) { animation-delay: 0.15s; }
        .cake-card:nth-child(3) { animation-delay: 0.2s; }
        .cake-card:nth-child(4) { animation-delay: 0.25s; }
        .cake-card:nth-child(5) { animation-delay: 0.3s; }
        .cake-card:nth-child(6) { animation-delay: 0.35s; }
        .cake-card:nth-child(7) { animation-delay: 0.4s; }
        .cake-card:nth-child(8) { animation-delay: 0.45s; }

        @keyframes cardPop {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }
        .cake-card:hover { transform: translateY(-5px); box-shadow: 0 8px 25px rgba(0,0,0,0.15); }

        .add-card-btn {
            background: #f5f5f5;
            border: 2px dashed #ccc;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s;
            min-height: 280px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #999;
            font-size: 3rem;
        }
        .add-card-btn:hover { border-color: #4CAF50; color: #4CAF50; }
        body:not(.admin-mode) .add-card-btn { display: none !important; }
        body.admin-mode .add-card-btn { display: flex !important; }

        .cake-card .delete-btn {
            display: none;
            position: absolute;
            top: 10px;
            right: 10px;
            background: #ff4444;
            color: #fff;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            z-index: 10;
        }
        .admin-bar.show ~ header,
        .admin-bar.show ~ nav,
        .admin-bar.show ~ main {
            margin-top: 50px;
        }
        body.admin-mode .cake-card .delete-btn { display: block; }

        .cake-image {
            width: 100%;
            height: 200px;
            background: #e8d5c4;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .cake-image img { width: 100%; height: 100%; object-fit: cover; }
        .cake-image .no-image { font-size: 3rem; color: #aaa; }

        .cake-info { padding: 20px; }
        .cake-category { font-size: 0.8rem; color: #888; text-transform: uppercase; margin-bottom: 8px; letter-spacing: 1px; }
        .cake-name { font-size: 1.3rem; color: #111; margin-bottom: 5px; }
        .cake-desc { color: #666; font-size: 0.9rem; line-height: 1.5; margin-bottom: 10px; }
        .cake-price { font-size: 1.4rem; color: #111; font-weight: bold; }

        footer { background: #111; color: #ccc; padding: 30px 20px; text-align: center; }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal.show { display: flex; }
        .modal-content {
            background: #fff;
            padding: 30px;
            border-radius: 15px;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal h2 { color: #111; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: #111; }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
        }
        .modal-buttons { display: flex; gap: 10px; }
        .modal-buttons button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
        }
        .submit-btn { background: #111; color: #fff; }
        .close-btn { background: #eee; color: #333; }

        .detail-modal { max-width: 900px; }
        .detail-content { display: flex; gap: 30px; flex-wrap: wrap; }
        .detail-image { flex: 1; min-width: 300px; }
        .detail-image img { width: 100%; border-radius: 15px; }
        .detail-image .no-image { height: 300px; background: #e8d5c4; display: flex; align-items: center; justify-content: center; border-radius: 15px; }
        .detail-info { flex: 1; min-width: 250px; }
        .detail-price { font-size: 2rem; color: #111; font-weight: bold; margin: 15px 0; }
        .detail-fill { margin: 10px 0; color: #666; }
        .detail-fill strong { color: #111; }

        .similar-cakes { margin-top: 30px; width: 100%; }
        .similar-cakes h3 { color: #111; margin-bottom: 15px; }
        .similar-grid { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 10px; }
        .similar-item {
            min-width: 150px;
            text-align: center;
            cursor: pointer;
        }
        .similar-item img { width: 100%; height: 100px; object-fit: cover; border-radius: 10px; }
        .similar-item .no-image { height: 100px; background: #e8d5c4; display: flex; align-items: center; justify-content: center; border-radius: 10px; }
        .similar-item p { font-size: 0.8rem; margin-top: 5px; color: #111; }

        .add-cake-modal input[type="file"] { display: none; }
        .upload-btn {
            background: #4CAF50;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            display: inline-block;
            margin-bottom: 10px;
        }
        .loading { text-align: center; padding: 40px; color: #666; }
    </style>
</head>
<body>
    <div class="admin-bar" id="admin-bar">
        <span>Режим админа</span>
        <button class="admin-close-btn" onclick="logoutAdmin()">× Выйти</button>
    </div>

    <button class="admin-btn" onclick="showLogin()" style="position:fixed;top:15px;right:15px;background:#666;color:#fff;border:none;padding:8px 15px;border-radius:5px;cursor:pointer;font-size:0.9rem;z-index:200;">Админ</button>

    <header>
        <svg class="header-swirls" viewBox="0 0 1200 160" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
            <g stroke="#ffffff" stroke-width="1.2" fill="none" opacity="0.18">
                <path d="M-10,80 C20,60 40,90 60,70 C80,50 100,80 120,65 C140,50 155,70 170,60"/>
                <path d="M10,100 C30,75 55,105 75,85 C95,65 115,95 140,80"/>
                <path d="M0,55 Q30,30 55,55 Q80,80 105,55 Q130,30 155,55"/>
                <path d="M-20,120 C15,95 45,125 70,105 C95,85 120,110 150,95"/>
                <path d="M5,40 Q25,15 50,35 Q75,55 95,35 Q115,15 135,35 Q155,55 175,40"/>
            </g>
            <g stroke="#ffffff" stroke-width="1.2" fill="none" opacity="0.18">
                <path d="M1210,80 C1180,60 1160,90 1140,70 C1120,50 1100,80 1080,65 C1060,50 1045,70 1030,60"/>
                <path d="M1190,100 C1170,75 1145,105 1125,85 C1105,65 1085,95 1060,80"/>
                <path d="M1200,55 Q1170,30 1145,55 Q1120,80 1095,55 Q1070,30 1045,55"/>
                <path d="M1220,120 C1185,95 1155,125 1130,105 C1105,85 1080,110 1050,95"/>
                <path d="M1195,40 Q1175,15 1150,35 Q1125,55 1105,35 Q1085,15 1065,35 Q1045,55 1025,40"/>
            </g>
            <g stroke="#ffffff" stroke-width="0.8" fill="none" opacity="0.12">
                <path d="M350,15 C400,5 450,25 500,12 C550,-1 600,20 650,12 C700,4 750,22 800,15 C850,8 900,25 950,15"/>
            </g>
            <g fill="#ffffff" opacity="0.1">
                <circle cx="200" cy="30" r="2.5"/><circle cx="225" cy="18" r="1.8"/><circle cx="215" cy="45" r="1.5"/>
                <circle cx="1000" cy="30" r="2.5"/><circle cx="975" cy="18" r="1.8"/><circle cx="985" cy="45" r="1.5"/>
            </g>
            <g stroke="#ffffff" stroke-width="1" fill="none" opacity="0.15" transform="translate(600,20)">
                <path d="M-60,0 C-40,-15 -20,5 0,-5 C20,-15 40,5 60,0"/>
                <path d="M-40,12 C-25,0 -10,15 0,8 C10,1 25,14 40,12"/>
                <circle cx="0" cy="-2" r="3" fill="#ffffff" stroke="none" opacity="0.3"/>
                <line x1="-70" y1="0" x2="-65" y2="0" stroke-width="1.5"/>
                <line x1="65" y1="0" x2="70" y2="0" stroke-width="1.5"/>
                <path d="M-8,20 Q0,30 8,20" stroke-width="0.8"/>
            </g>
        </svg>
        <div class="header-inner">
            <h1>Торты на заказ</h1>
            <p class="subtitle">Ручная работа с любовью</p>
        </div>
    </header>

    <nav id="category-nav">
        <button class="active" data-category="all">Все</button>
        <button class="add-cat-btn" onclick="showAddCategory()">+</button>
    </nav>

    <main>
        <div class="loading" id="loading">Загрузка...</div>
        <div class="cakes-grid" id="cakes-grid" style="display:none;"></div>
    </main>

    <footer>
        <div>Тел: +7 (999) 000-00-00</div>
        <p>Заказ от 3 дней. Доставка по городу бесплатно.</p>
    </footer>

    <div class="modal" id="order-modal">
        <div class="modal-content">
            <h2>Оформить заказ</h2>
            <form id="order-form">
                <div class="form-group">
                    <label>Торт</label>
                    <input type="text" id="order-cake-name" readonly>
                </div>
                <div class="form-group">
                    <label>Ваше имя</label>
                    <input type="text" name="name" required>
                </div>
                <div class="form-group">
                    <label>Телефон</label>
                    <input type="tel" name="phone" required>
                </div>
                <div class="form-group">
                    <label>Дата</label>
                    <input type="date" name="date" required>
                </div>
                <div class="form-group">
                    <label>Комментарий</label>
                    <textarea name="comment" rows="3"></textarea>
                </div>
                <div class="modal-buttons">
                    <button type="button" class="close-btn" onclick="closeOrderModal()">Отмена</button>
                    <button type="submit" class="submit-btn">Отправить</button>
                </div>
            </form>
        </div>
    </div>

    <div class="modal" id="detail-modal">
        <div class="modal-content detail-modal">
            <div class="detail-content" id="detail-content"></div>
            <div class="modal-buttons" style="margin-top: 20px;">
                <button class="submit-btn" onclick="orderFromDetail()">Заказать</button>
                <button class="close-btn" onclick="closeDetail()">Закрыть</button>
            </div>
        </div>
    </div>

    <div class="modal" id="login-modal">
        <div class="modal-content">
            <h2>Вход в админ</h2>
            <div class="form-group">
                <label>Пароль</label>
                <input type="password" id="admin-password">
            </div>
            <div class="modal-buttons">
                <button class="close-btn" onclick="closeLogin()">Отмена</button>
                <button class="submit-btn" onclick="checkPassword()">Войти</button>
            </div>
        </div>
    </div>

    <div class="modal" id="add-category-modal">
        <div class="modal-content">
            <h2>Добавить категорию</h2>
            <div class="form-group">
                <label>Название</label>
                <input type="text" id="new-category-name">
            </div>
            <div class="form-group">
                <label>Ключ (eng)</label>
                <input type="text" id="new-category-key">
            </div>
            <div class="modal-buttons">
                <button class="close-btn" onclick="closeAddCategory()">Отмена</button>
                <button class="submit-btn" onclick="addCategory()">Добавить</button>
            </div>
        </div>
    </div>

    <div class="modal" id="add-cake-modal">
        <div class="modal-content add-cake-modal">
            <h2>Добавить торт</h2>
            <div class="form-group">
                <label>Фото</label>
                <input type="file" id="new-cake-image-input" accept="image/*" onchange="previewImage()">
                <label class="upload-btn" for="new-cake-image-input">Выбрать фото</label>
                <div id="image-preview" style="margin-bottom: 10px;"></div>
            </div>
            <div class="form-group">
                <label>Название</label>
                <input type="text" id="new-cake-name">
            </div>
            <div class="form-group">
                <label>Категория</label>
                <select id="new-cake-category"></select>
            </div>
            <div class="form-group">
                <label>Описание</label>
                <textarea id="new-cake-desc" rows="2"></textarea>
            </div>
            <div class="form-group">
                <label>Начинка</label>
                <input type="text" id="new-cake-fill">
            </div>
            <div class="form-group">
                <label>Цена (₽)</label>
                <input type="number" id="new-cake-price">
            </div>
            <div class="form-group">
                <label>Похожие (id через запятую)</label>
                <input type="text" id="new-cake-similar" placeholder="1,2,3">
            </div>
            <div class="modal-buttons">
                <button class="close-btn" onclick="closeAddCake()">Отмена</button>
                <button class="submit-btn" onclick="addCake()">Добавить</button>
            </div>
        </div>
    </div>

    <script>
        let cakes = [];
        let categories = {};
        let currentDetailCake = null;
        let tempImage = "";
        let isAdmin = false;
        let currentFilter = "all";

        async function loadData() {
            try {
                const [cakesRes, categoriesRes] = await Promise.all([
                    fetch('/api/cakes'),
                    fetch('/api/categories')
                ]);
                cakes = await cakesRes.json();
                categories = await categoriesRes.json();
                document.getElementById('loading').style.display = 'none';
                document.getElementById('cakes-grid').style.display = 'grid';
                renderNav();
                renderCakes();
            } catch (error) {
                document.getElementById('loading').textContent = 'Ошибка загрузки данных';
                console.error(error);
            }
        }

        function renderNav() {
            const nav = document.getElementById('category-nav');
            let html = '<button data-category="all">Все</button>';
            for (let key in categories) {
                html += '<span class="nav-cat-group">';
                html += '<button data-category="' + key + '">' + categories[key] + '</button>';
                html += '<button class="nav-cat-del" onclick="deleteCategory(\'' + key + '\')" title="Удалить категорию">×</button>';
                html += '</span>';
            }
            if (isAdmin) {
                html += '<button class="add-cat-btn" onclick="showAddCategory()">+</button>';
            }
            nav.innerHTML = html;

            const activeBtn = nav.querySelector('[data-category="' + currentFilter + '"]') || nav.querySelector('[data-category="all"]');
            if (activeBtn) activeBtn.classList.add('active');

            nav.querySelectorAll('button').forEach(btn => {
                btn.addEventListener('click', () => {
                    if (btn.classList.contains('add-cat-btn')) return;
                    if (btn.classList.contains('nav-cat-del')) return;
                    nav.querySelectorAll('button').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentFilter = btn.dataset.category || "all";
                    renderCakes(currentFilter);
                });
            });
        }

        function renderCakes(filter) {
            if (!filter) filter = "all";
            const grid = document.getElementById('cakes-grid');
            const filtered = filter === "all" ? cakes : cakes.filter(c => c.category === filter);
            let html = "";

            if (isAdmin) {
                const cat = filter === "all" ? "" : filter;
                html += '<div class="add-card-btn" onclick="showAddCake(\'' + cat + '\')">';
                html += '<span>+</span>';
                html += '<span style="font-size:1rem;margin-top:10px;">Добавить торт</span>';
                html += '</div>';
            }

            filtered.forEach((cake, index) => {
                const desc = cake.description || cake.desc || '';
                const catName = categories[cake.category] || cake.category;
                html += '<div class="cake-card" style="animation-delay: ' + (0.05 * (index + 1)) + 's" onclick="showDetail(' + cake.id + ')">';
                html += '<button class="delete-btn" onclick="event.stopPropagation();deleteCake(' + cake.id + ')">×</button>';
                html += '<div class="cake-image">';
                if (cake.image) {
                    html += '<img src="' + cake.image + '" alt="' + cake.name + '">';
                } else {
                    html += '<span class="no-image">🎂</span>';
                }
                html += '</div>';
                html += '<div class="cake-info">';
                html += '<div class="cake-category">' + catName + '</div>';
                html += '<h3 class="cake-name">' + cake.name + '</h3>';
                html += '<p class="cake-desc">' + desc + '</p>';
                html += '<div class="cake-price">' + cake.price.toLocaleString() + ' ₽</div>';
                html += '</div>';
                html += '</div>';
            });

            grid.innerHTML = html;
        }

        function showDetail(id) {
            const cake = cakes.find(c => c.id === id);
            if (!cake) return;
            currentDetailCake = cake;
            const desc = cake.description || cake.desc || '';
            const catName = categories[cake.category] || cake.category;
            const similarList = cake.similar_ids || cake.similar || [];
            const similar = similarList.map(sid => cakes.find(c => c.id === sid)).filter(Boolean);

            let contentHtml = '';
            contentHtml += '<div class="detail-image">';
            if (cake.image) {
                contentHtml += '<img src="' + cake.image + '" alt="' + cake.name + '">';
            } else {
                contentHtml += '<div class="no-image"><span class="no-image">🎂</span></div>';
            }
            contentHtml += '</div>';
            contentHtml += '<div class="detail-info">';
            contentHtml += '<div class="cake-category">' + catName + '</div>';
            contentHtml += '<h2 style="color: #111;">' + cake.name + '</h2>';
            contentHtml += '<p style="margin: 15px 0; color: #666;">' + desc + '</p>';
            contentHtml += '<div class="detail-price">' + cake.price.toLocaleString() + ' ₽</div>';
            contentHtml += '<div class="detail-fill"><strong>Начинка:</strong> ' + cake.fill + '</div>';
            contentHtml += '</div>';

            if (similar.length > 0) {
                contentHtml += '<div class="similar-cakes">';
                contentHtml += '<h3>Похожие варианты</h3>';
                contentHtml += '<div class="similar-grid">';
                similar.forEach(s => {
                    contentHtml += '<div class="similar-item" onclick="showDetail(' + s.id + ')">';
                    if (s.image) {
                        contentHtml += '<img src="' + s.image + '" alt="' + s.name + '">';
                    } else {
                        contentHtml += '<div class="no-image"><span class="no-image">🎂</span></div>';
                    }
                    contentHtml += '<p>' + s.name + '</p>';
                    contentHtml += '</div>';
                });
                contentHtml += '</div></div>';
            }

            document.getElementById('detail-content').innerHTML = contentHtml;
            document.getElementById('detail-modal').classList.add('show');
        }

        function closeDetail() {
            document.getElementById('detail-modal').classList.remove('show');
            currentDetailCake = null;
        }

        function orderFromDetail() {
            if (currentDetailCake) {
                document.getElementById('order-cake-name').value = currentDetailCake.name;
                document.getElementById('order-modal').classList.add('show');
            }
        }

        function showLogin() {
            document.getElementById('login-modal').classList.add('show');
            document.getElementById('admin-password').value = '';
        }

        function closeLogin() {
            document.getElementById('login-modal').classList.remove('show');
        }

        function checkPassword() {
            if (document.getElementById('admin-password').value === '1698') {
                closeLogin();
                loginAdmin();
            } else {
                alert('Неверный пароль!');
            }
        }

        function loginAdmin() {
            isAdmin = true;
            document.body.classList.add('admin-mode');
            document.getElementById('admin-bar').classList.add('show');
            renderCakes(currentFilter);
            renderNav();
        }

        function logoutAdmin() {
            isAdmin = false;
            document.body.classList.remove('admin-mode');
            document.getElementById('admin-bar').classList.remove('show');
            renderCakes(currentFilter);
            renderNav();
        }

        async function deleteCake(id) {
            if (!confirm('Удалить торт?')) return;
            const res = await fetch('/api/cakes/' + id + '?admin_pass=1698', { method: 'DELETE' });
            if (res.ok) {
                cakes = cakes.filter(c => c.id !== id);
                renderCakes(currentFilter);
            }
        }

        function showAddCategory() {
            document.getElementById('new-category-name').value = '';
            document.getElementById('new-category-key').value = '';
            document.getElementById('add-category-modal').classList.add('show');
        }

        function closeAddCategory() {
            document.getElementById('add-category-modal').classList.remove('show');
        }

        async function addCategory() {
            const name = document.getElementById('new-category-name').value.trim();
            const cat_key = document.getElementById('new-category-key').value.trim();
            if (name && cat_key) {
                const res = await fetch('/api/categories', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ cat_key, name, admin_pass: '1698' })
                });
                if (res.ok) {
                    categories[cat_key] = name;
                    renderNav();
                    closeAddCategory();
                }
            }
        }

        async function deleteCategory(cat_key) {
            const hasCakes = cakes.some(c => c.category === cat_key);
            const msg = hasCakes
                ? 'В категории "' + categories[cat_key] + '" есть торты (' + cakes.filter(c => c.category === cat_key).length + ' шт.). Удалить категорию и все торты в ней?'
                : 'Удалить категорию "' + categories[cat_key] + '"?';
            if (!confirm(msg)) return;

            if (hasCakes) {
                const cakeIds = cakes.filter(c => c.category === cat_key).map(c => c.id);
                for (const id of cakeIds) {
                    await fetch('/api/cakes/' + id + '?admin_pass=1698', { method: 'DELETE' });
                }
                cakes = cakes.filter(c => c.category !== cat_key);
            }

            const res = await fetch('/api/categories/' + cat_key + '?admin_pass=1698', { method: 'DELETE' });
            if (res.ok) {
                delete categories[cat_key];
                if (currentFilter === cat_key) currentFilter = "all";
                renderNav();
                renderCakes(currentFilter);
            } else {
                alert('Ошибка при удалении категории');
            }
        }

        function showAddCake(category) {
            tempImage = "";
            document.getElementById('image-preview').innerHTML = '';
            document.getElementById('new-cake-name').value = '';
            document.getElementById('new-cake-desc').value = '';
            document.getElementById('new-cake-fill').value = '';
            document.getElementById('new-cake-price').value = '';
            document.getElementById('new-cake-similar').value = '';
            const select = document.getElementById('new-cake-category');
            select.innerHTML = Object.entries(categories).map(([key, name]) =>
                '<option value="' + key + '" ' + (key === category ? 'selected' : '') + '>' + name + '</option>'
            ).join('');
            document.getElementById('add-cake-modal').classList.add('show');
        }

        function closeAddCake() {
            document.getElementById('add-cake-modal').classList.remove('show');
        }

        function previewImage() {
            const file = document.getElementById('new-cake-image-input').files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    tempImage = e.target.result;
                    document.getElementById('image-preview').innerHTML = '<img src="' + tempImage + '" style="width:100px;height:100px;object-fit:cover;border-radius:8px;">';
                };
                reader.readAsDataURL(file);
            }
        }

        async function addCake() {
            const name = document.getElementById('new-cake-name').value.trim();
            const category = document.getElementById('new-cake-category').value;
            const description = document.getElementById('new-cake-desc').value.trim();
            const fill = document.getElementById('new-cake-fill').value.trim();
            const price = parseInt(document.getElementById('new-cake-price').value) || 0;
            const similarStr = document.getElementById('new-cake-similar').value.trim();
            const similar_ids = similarStr ? similarStr.split(',').map(s => parseInt(s.trim())).filter(n => n) : [];

            if (!name) {
                alert('Введи название торта');
                return;
            }
            if (price <= 0) {
                alert('Введи цену');
                return;
            }

            const res = await fetch('/api/cakes', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, category, description, fill, price, similar_ids, image: tempImage })
            });

            if (res.ok) {
                const newCake = await res.json();
                cakes.push(newCake);
                renderCakes(currentFilter);
                closeAddCake();
            } else {
                const result = await res.json();
                alert('Ошибка: ' + (result.error || 'Неизвестная ошибка'));
            }
        }

        function closeOrderModal() { document.getElementById('order-modal').classList.remove('show'); }
        document.getElementById('order-form').addEventListener('submit', (e) => {
            e.preventDefault();
            alert('Заявка отправлена! Мы свяжемся с вами.');
            closeOrderModal();
            e.target.reset();
        });
        document.getElementById('order-modal').addEventListener('click', (e) => {
            if (e.target.id === 'order-modal') closeOrderModal();
        });

        loadData();
    </script>
</body>
</html>
